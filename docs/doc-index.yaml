    does_not_own: "Current MVP scope contracts, exact schemas, API behavior, storage, security claims, or accepted implementation behavior."

  - doc_id: reference.index
    status: active
    family: reference
    paths:
      en: docs/en/reference/README.md
      ko: docs/ko/reference/README.md
    default_for_agent: en
    owns: "Reference owner routing."
