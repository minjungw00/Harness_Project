version: 1
metadata:
  purpose: "Route documentation retrieval by stable doc_id and language."
  documentation_metadata_only: true
  runtime_config: false
retrieval_rule:
  load_one_language_per_doc_id: true
  default_agent_language: en
  allow_korean_when_user_context_is_korean: true
  paired_docs_must_not_be_loaded_together: true
  paired_docs_exception: translation_or_semantic_parity_review_only
docs:
  - doc_id: docs.index
    status: active
    family: index
    paths:
      en: docs/en/README.md
      ko: docs/ko/README.md
    default_for_agent: en
    owns: "Language-specific entry routing only."
    does_not_own: "Technical contracts, active MVP scope, API/storage/security details, or implementation readiness."

  - doc_id: start
    status: active
    family: start
    paths:
      en: docs/en/start.md
      ko: docs/ko/start.md
    default_for_agent: en
    owns: "First-read product orientation."
    does_not_own: "Exact contracts or implementation readiness."

  - doc_id: use.user-guide
    status: active
    family: use
    paths:
      en: docs/en/use/user-guide.md
      ko: docs/ko/use/user-guide.md
    default_for_agent: en
    owns: "User-facing workflow guidance."
    does_not_own: "Internal contracts, schemas, storage, or connector behavior."

  - doc_id: use.agent-guide
    status: active
    family: use
    paths:
      en: docs/en/use/agent-guide.md
      ko: docs/ko/use/agent-guide.md
    default_for_agent: en
    owns: "Agent operating guidance and context discipline."
    does_not_own: "Connector reference contracts, API schemas, storage, or security guarantees."

  - doc_id: use.judgment-examples
    status: active
    family: use
    paths:
      en: docs/en/use/judgment-examples.md
      ko: docs/ko/use/judgment-examples.md
    default_for_agent: en
    owns: "Examples for distinct user-owned judgment situations."
    does_not_own: "Canonical judgment schemas, values, or Core authority."

  - doc_id: use.surface-recipes
    status: active
    family: use
    paths:
      en: docs/en/use/surface-recipes.md
      ko: docs/ko/use/surface-recipes.md
    default_for_agent: en
    owns: "Surface-specific usage recipes."
    does_not_own: "Connector contracts, API schemas, storage effects, or security guarantees."

  - doc_id: build.mvp-plan
    status: active
    family: build
    paths:
      en: docs/en/build/mvp-plan.md
      ko: docs/ko/build/mvp-plan.md
