version: harness-conformance-fixtures-v04
scenarios:
  - id: CF-001
    title: Active Task 없음 상태 조회
    initial:
      project:
        project_id: PRJ-TEST
        active_task: null
    steps:
      - call: harness.status
        input:
          detail: compact
        expect:
          ok: true
          mutates_state: false
          status_card_contains:
            - "active task"
    expected:
      events: []
      projection_jobs: []

  - id: CF-003
    title: Direct 성공
    initial:
      project:
        project_id: PRJ-TEST
      files:
        src/profile/ProfileForm.tsx: "button: Savee"
    steps:
      - call: harness.intake
        input:
          user_request: "프로필 저장 버튼 오타 고쳐줘"
          resume_policy: auto
        expect:
          ok: true
          mode: direct
          phase: ready
      - call: harness.prepare_write
        input:
          intended_paths: ["src/profile/ProfileForm.tsx"]
          intended_tools: ["edit", "pnpm test src/profile"]
          intended_sensitive_categories: []
          write_kind: file_edit
        expect:
          ok: true
          allowed: true
          baseline_ref: present
      - simulate:
          changed_files: ["src/profile/ProfileForm.tsx"]
          diff_ref: DIFF-TEST-001
          logs_ref: LOG-TEST-001
      - call: harness.record_change
        input:
          changed_files: ["src/profile/ProfileForm.tsx"]
          commands:
            - command: "pnpm test src/profile"
              exit_code: 0
              log_ref: LOG-TEST-001
          diff_ref: DIFF-TEST-001
          summary: "버튼 오타 수정"
        expect:
          ok: true
          validators:
            changed_paths: passed
      - call: harness.finish_direct
        input:
          outcome: passed
          summary: "저장 버튼 오타 수정 완료"
          checks:
            - name: changed_paths
              status: passed
          escalated_to_work: false
        expect:
          ok: true
          new_state:
            phase: completed
            result: passed
            assurance_level: self_checked
    expected:
      events: [task_intaken, task_classified, write_prepared, change_recorded, direct_finished]
      projections: [task, direct_result]
      artifacts: [baseline, diff, log, direct_result_doc]

  - id: CF-005
    title: Dependency 추가 요청은 approval 없이 차단
    initial:
      project:
        project_id: PRJ-TEST
    steps:
      - call: harness.intake
        input:
          user_request: "로그인 폼 검증을 위해 새 validation dependency 추가해줘"
          resume_policy: auto
        expect:
          ok: true
          mode: work
      - call: harness.prepare_write
        input:
          intended_paths: ["package.json", "pnpm-lock.yaml"]
          intended_tools: ["pnpm add zod"]
          intended_sensitive_categories: [dependency_change]
          write_kind: shell_modify
        expect:
          ok: false
          error_code: APPROVAL_REQUIRED
          allowed: false
    expected:
      final_state:
        approval_state: not_required_or_pending
      blocked_reasons:
        - dependency_change requires approval

  - id: CF-008
    title: Work 구현 완료 후 바로 close 차단
    initial:
      task:
        task_id: TASK-WORK-001
        mode: work
        phase: executing
        evidence_state: sufficient
        assurance_level: self_checked
        acceptance_state: not_requested
    steps:
      - call: harness.finish_implementation
        input:
          change_unit_id: CU-01
          summary: "구현 완료"
          spine_updates: {}
          issues_and_followups: []
          evidence_refs:
            diff: DIFF-TEST-002
            logs: LOG-TEST-002
        expect:
          ok: true
          requires_verify: true
      - call: harness.close_task
        input:
          requested_by_surface: reference_local_mcp
        expect:
          ok: false
          error_code: EVIDENCE_INSUFFICIENT
          blocked_reasons_contains:
            - missing passed EVAL
    expected:
      final_state:
        phase: verifying
      projections: [task, run_summary]

  - id: CF-009
    title: Same-session 자기 검토는 detached_verified 불가
    initial:
      task:
        task_id: TASK-WORK-002
        mode: work
        phase: verifying
        lead_run_id: RUN-LEAD-001
        evidence_state: sufficient
    steps:
      - call: harness.record_eval
        input:
          verify_run_id: RUN-LEAD-001
          verdict: passed
          assurance_impact: detached_verified
          acceptance_impact: not_requested
          verification_independence:
            context: same_session
            write_capable: true
            product_file_write_allowed: true
            source_input: chat_history
            baseline_reverified: false
            evaluator_surface_id: reference_local_mcp
            parent_run_id: RUN-LEAD-001
          checks_performed: []
          evidence_reviewed: {}
          rationale: "self review"
          blockers_or_rework: []
          user_followup: []
        expect:
          ok: false
          error_code: VERIFY_NOT_DETACHED
    expected:
      validators:
        same_session_verify_guard: hard_block
      final_state:
        assurance_level: self_checked_or_none

  - id: CF-010
    title: Fresh evaluator + bundle 검증 통과
    initial:
      task:
        task_id: TASK-WORK-003
        mode: work
        phase: verifying
        evidence_state: sufficient
        lead_run_id: RUN-LEAD-002
    steps:
      - call: harness.launch_verify
        input:
          change_unit_id: CU-01
          isolation: manual_bundle
        expect:
          ok: true
          source_bundle_artifact_id: present
      - call: harness.record_eval
        input:
          verify_run_id: RUN-EVAL-001
          verdict: passed
          assurance_impact: detached_verified
          acceptance_impact: not_requested
          verification_independence:
            context: fresh_session
            write_capable: false
            product_file_write_allowed: false
            source_input: bundle
            baseline_reverified: true
            evaluator_surface_id: reference_local_mcp
            parent_run_id: RUN-LEAD-002
          checks_performed:
            - name: same_session_verify_guard
              status: passed
            - name: evidence_sufficiency
              status: passed
          evidence_reviewed:
            bundle: BND-TEST-001
          rationale: "Bundle evidence supports all acceptance criteria."
          blockers_or_rework: []
          user_followup: []
        expect:
          ok: true
          new_state:
            assurance_level: detached_verified
            result: passed
    expected:
      events: [verify_launched, eval_recorded]
      artifacts: [bundle, eval_doc]

  - id: CF-014
    title: 사용자가 TASK managed 영역 직접 수정
    initial:
      task:
        task_id: TASK-DRIFT-001
        projection_freshness: current
      files:
        docs/tasks/active/TASK-DRIFT-001.md: managed_current
    steps:
      - simulate:
          edit_managed_block: true
      - call: harness.reconcile.scan
        input:
          task_id: TASK-DRIFT-001
        expect:
          ok: true
          reconcile_item_created: true
    expected:
      final_state:
        canonical_state_changed: false
      events: [reconcile_detected]
