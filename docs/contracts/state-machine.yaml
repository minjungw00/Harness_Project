version: harness-state-machine-v04
purpose: >
  Defines canonical state enums, tool-level transitions, guard behavior, validator triggers,
  projection jobs, and completion conditions for the MVP reference implementation.

canonical_fields:
  mode: [advisor, direct, work]
  phase: [intake, shaping, ready, executing, verifying, waiting_user, blocked, completed, cancelled]
  result: [none, advice_only, passed, failed, cancelled]
  assurance_level: [none, self_checked, detached_verified]
  approval_state: [not_required, pending, granted, denied, expired]
  acceptance_state: [not_requested, pending, accepted, rejected]
  risk_level: [low, medium, high]
  evidence_state: [none, partial, sufficient, stale]

sensitive_categories:
  - auth_change
  - permission_model_change
  - schema_change
  - dependency_change
  - public_api_change
  - destructive_write
  - network_write
  - external_service_write
  - secret_access
  - production_config_change
  - ci_cd_change
  - infra_or_deployment_change
  - privacy_or_pii_change
  - data_export
  - telemetry_or_logging_change
  - license_or_compliance_change
  - billing_or_cost_change
  - model_or_prompt_policy_change
  - policy_override

global_guards:
  state_conflict:
    when: expected_state_version is provided and does not equal current state_version
    error: STATE_CONFLICT
    transition: none
  lock_required:
    when: state-changing tool is called
    error: LOCK_UNAVAILABLE
    transition: none
  unknown_task:
    when: task_id is required but not found
    error: UNKNOWN_TASK
    transition: none
  projection_reconcile_required:
    when: unresolved reconcile item affects active task managed state
    error: RECONCILE_REQUIRED
    transition: blocked_unless_tool_is_reconcile_or_status
  approval_required:
    when: intended_sensitive_categories contains approval-required category and no granted in-scope approval exists
    error: APPROVAL_REQUIRED
    transition: none
  approval_denied:
    when: applicable approval status is denied
    error: APPROVAL_DENIED
    transition: none
  approval_expired:
    when: applicable approval status is expired or scope drift is detected
    error: APPROVAL_EXPIRED
    transition: none
  scope_violation:
    when: intended path, tool, network target, or secret scope exceeds active Change Unit and granted approvals
    error: SCOPE_VIOLATION
    transition: none
  baseline_stale:
    when: baseline-dependent operation detects repo drift without revalidation
    error: BASELINE_STALE
    transition: mark_evidence_stale_or_blocked
  verify_not_detached:
    when: record_eval requests detached_verified but independence criteria are not met
    error: VERIFY_NOT_DETACHED
    transition: none
  evidence_insufficient:
    when: close_task or record_eval passed requires supported criteria and manifest is insufficient
    error: EVIDENCE_INSUFFICIENT
    transition: blocked_or_waiting_user

completion_conditions:
  direct:
    required:
      - phase is executing or ready
      - finish_direct outcome is passed, failed, or cancelled
      - changed_paths validator has no hard failure when product files changed
      - DIRECT-RESULT projection job is enqueued
    resulting_assurance_upper_bound: self_checked
  work:
    required:
      - active Change Unit is completed or explicitly deferred
      - required approvals are granted and not scope-drifted
      - evidence_state is sufficient
      - latest EVAL verdict is passed
      - assurance_level is detached_verified or explicit policy exception exists
      - acceptance_state is not_requested or accepted
      - projection freshness is current, or stale/failed is explicitly displayed to user
    blocked_by:
      - same-session self-review recorded as detached verification
      - unsupported acceptance criteria without user acceptance exception
      - unresolved reconcile item affecting active task
      - stale baseline without revalidation

display_state_derivation:
  rules:
    - name: approval_pending
      when: approval_state == pending
      display_state: approval_pending
    - name: verify_pending
      when: mode == work and phase == verifying and assurance_level != detached_verified
      display_state: verify_pending
    - name: acceptance_pending
      when: acceptance_state == pending
      display_state: acceptance_pending
    - name: blocked
      when: phase == blocked
      display_state: blocked
    - name: completed
      when: phase == completed
      display_state: completed
    - name: default
      when: otherwise
      display_state: "{mode}_{phase}"

events:
  task_intaken: creates task
  task_classified: sets mode and initial phase
  task_shaped: updates goal scope acceptance criteria and Change Units
  write_prepared: records baseline and allowed scope
  approval_requested: creates APR
  user_decision_recorded: records approval denial acceptance rejection or scope confirmation
  change_recorded: registers changed files commands logs diff checkpoint
  evidence_manifest_updated: updates AC evidence mapping
  direct_finished: creates DIRECT-RESULT
  implementation_finished: creates RUN-SUMMARY and moves work to verifying
  verify_launched: creates verify run or bundle
  eval_recorded: creates EVAL and updates assurance/result/acceptance
  task_closed: moves task to completed
  task_cancelled: moves task to cancelled
  projection_enqueued: schedules projection update
  reconcile_detected: creates reconcile item
  reconcile_resolved: resolves reconcile item
  recovery_recorded: records repair action

tool_rules:
  harness.status:
    mutates_state: false
    allowed_phases: [intake, shaping, ready, executing, verifying, waiting_user, blocked, completed, cancelled]
    output:
      includes: [status_card, projection_freshness, next_action, pending_decision_summary]

  harness.intake:
    mutates_state: true
    allowed_when:
      - no active task and resume_policy != force_existing
      - active task exists and resume_policy in [auto, force_existing]
    guards: [state_conflict, lock_required]
    classification:
      advisor:
        conditions:
          - request is explanation, comparison, review, decision draft, or read-only analysis
        state:
          mode: advisor
          phase: executing
          result: none
          assurance_level: none
          evidence_state: none
      direct:
        conditions:
          - request is small, local, low risk, and acceptance is obvious
          - no approval-required sensitive category is apparent
        state:
          mode: direct
          phase: ready
          result: none
          risk_level: low
      work:
        conditions:
          - request includes feature, structural change, multi-file change, refactor, or high risk
        state:
          mode: work
          phase: shaping
          result: none
          risk_level: medium
    events: [task_intaken, task_classified, projection_enqueued]
    projection_jobs: [task]

  harness.next:
    mutates_state: false
    allowed_phases: [intake, shaping, ready, executing, verifying, waiting_user, blocked, completed, cancelled]
    output:
      includes: [next_action, allowed_actions, instruction_bundle, requires_user_decision, requires_approval]

  harness.prepare_write:
    mutates_state: true
    allowed_modes: [direct, work]
    allowed_phases: [ready, executing, shaping]
    guards:
      - state_conflict
      - lock_required
      - reconcile_required_if_affects_scope
      - approval_required
      - approval_denied
      - approval_expired
      - scope_violation
      - capability_sufficient_for_write
    on_success:
      state_updates:
        phase: executing
        active_run_id: create_or_update_current_run
        last_baseline_ref: capture_baseline
      events: [write_prepared, projection_enqueued]
      validators: [surface_capability_check, approval_scope, baseline_freshness]
      projection_jobs: [task]
    on_blocked:
      state_updates:
        phase: blocked_when_guard_requires_block
        next_action: request approval, shrink scope, or refresh baseline

  harness.request_approval:
    mutates_state: true
    allowed_modes: [direct, work]
    allowed_phases: [shaping, ready, executing, blocked]
    guards: [state_conflict, lock_required]
    required_fields:
      - category
      - summary
      - allowed_paths
      - allowed_tools
      - baseline_ref
      - recommendation
    on_success:
      state_updates:
        approval_state: pending
        phase: waiting_user
        latest_approval_id: approval_id
        pending_decision_summary: approval requested
      events: [approval_requested, projection_enqueued]
      projection_jobs: [approval, task]

  harness.user_decision:
    mutates_state: true
    allowed_phases: [shaping, ready, executing, verifying, waiting_user, blocked]
    guards: [state_conflict, lock_required]
    decision_kinds:
      approval:
        target: approval_id
        valid_target_status: pending
        state_updates:
          approval_state: granted
          phase: ready
      denial:
        target: approval_id
        valid_target_status: pending
        state_updates:
          approval_state: denied
          phase: blocked
      acceptance:
        target: task_id_or_eval_id
        state_updates:
          acceptance_state: accepted
          phase: completed_when_completion_conditions_pass_else_waiting_user
      rejection:
        target: task_id_or_eval_id
        state_updates:
          acceptance_state: rejected
          phase: shaping
      scope_confirmation:
        target: task_id_or_change_unit_id
        state_updates:
          phase: ready
      reconcile_decision:
        target: reconcile_id
        state_updates:
          depends_on_resolution
    events: [user_decision_recorded, projection_enqueued]
    projection_jobs: [task, approval, evidence_manifest]

  harness.record_change:
    mutates_state: true
    allowed_modes: [direct, work]
    allowed_phases: [executing]
    guards:
      - state_conflict
      - lock_required
      - changed_paths_within_allowed_scope
      - approval_scope
    on_success:
      state_updates:
        evidence_state: partial_or_sufficient_based_on_validator
        latest_checkpoint_artifact_id: checkpoint_ref_when_present
      events: [change_recorded, projection_enqueued]
      validators: [changed_paths, approval_scope, baseline_freshness]
      projection_jobs: [task]

  harness.update_evidence_manifest:
    mutates_state: true
    allowed_modes: [direct, work]
    allowed_phases: [executing, verifying, blocked]
    guards: [state_conflict, lock_required]
    on_success:
      state_updates:
        evidence_state: none_partial_sufficient_or_stale
        latest_evidence_manifest_id: evidence_manifest_id
      events: [evidence_manifest_updated, projection_enqueued]
      validators: [evidence_sufficiency]
      projection_jobs: [evidence_manifest, task]

  harness.finish_direct:
    mutates_state: true
    allowed_modes: [direct]
    allowed_phases: [ready, executing, blocked]
    guards:
      - state_conflict
      - lock_required
      - changed_paths_no_hard_failure_if_changed
    on_success:
      if_escalated_to_work:
        state_updates:
          mode: work
          phase: shaping
          result: none
          assurance_level: none
      if_passed:
        state_updates:
          phase: completed
          result: passed
          assurance_level: self_checked
      if_failed:
        state_updates:
          phase: blocked
          result: failed
          assurance_level: self_checked
      if_cancelled:
        state_updates:
          phase: cancelled
          result: cancelled
      events: [direct_finished, projection_enqueued]
      projection_jobs: [direct_result, task]
      validators: [required_docs_present, docs_consistency]

  harness.finish_implementation:
    mutates_state: true
    allowed_modes: [work]
    allowed_phases: [executing, blocked]
    guards:
      - state_conflict
      - lock_required
      - evidence_not_none
      - active_change_unit_exists
    on_success:
      state_updates:
        phase: verifying
        assurance_level: self_checked
        latest_run_summary_artifact_id: run_summary_id
        next_action: detached verify required
      events: [implementation_finished, projection_enqueued]
      validators: [changed_paths, approval_scope, evidence_sufficiency, required_docs_present]
      projection_jobs: [run_summary, task, evidence_manifest]

  harness.launch_verify:
    mutates_state: true
    allowed_modes: [work]
    allowed_phases: [verifying, blocked]
    guards:
      - state_conflict
      - lock_required
      - evidence_sufficiency_or_allow_blocked_bundle
      - surface_capability_check
    on_success:
      state_updates:
        phase: verifying
        next_action: evaluator result pending
      events: [verify_launched, projection_enqueued]
      validators: [bundle_integrity, evidence_sufficiency, baseline_freshness]
      projection_jobs: [task]

  harness.record_eval:
    mutates_state: true
    allowed_modes: [work]
    allowed_phases: [verifying, blocked]
    guards:
      - state_conflict
      - lock_required
      - same_session_verify_guard
      - evidence_sufficiency_when_verdict_passed
      - approval_scope_when_verdict_passed
    on_success:
      verdict_passed_no_acceptance_needed:
        state_updates:
          phase: completed
          result: passed
          assurance_level: detached_verified
          acceptance_state: not_requested
      verdict_passed_acceptance_needed:
        state_updates:
          phase: waiting_user
          result: none
          assurance_level: detached_verified
          acceptance_state: pending
      verdict_failed:
        state_updates:
          phase: shaping
          result: failed
          assurance_level: self_checked
      verdict_blocked:
        state_updates:
          phase: blocked
          evidence_state: partial_or_stale
      events: [eval_recorded, projection_enqueued]
      validators: [same_session_verify_guard, evidence_sufficiency, acceptance_review, docs_consistency]
      projection_jobs: [eval, task, evidence_manifest]

  harness.close_task:
    mutates_state: true
    allowed_phases: [completed, waiting_user, verifying, blocked]
    guards:
      - state_conflict
      - lock_required
      - completion_conditions
      - reconcile_required
    on_success:
      state_updates:
        phase: completed
        result: passed
        completed_at: now
      events: [task_closed, projection_enqueued]
      validators: [required_docs_present, docs_consistency, evidence_sufficiency, acceptance_review]
      projection_jobs: [task]
    on_blocked:
      blocked_reasons:
        - missing passed EVAL
        - evidence insufficient
        - acceptance pending or rejected
        - approval not granted or expired
        - reconcile required
        - projection failed and not disclosed

projection_job_rules:
  enqueue_on_state_change: true
  increment_projection_version_with_state_change: true
  older_job_behavior: supersede
  failure_behavior: mark_projection_failed_and_keep_state_current
  stale_condition: projected_version < projection_version

validator_hard_blocks:
  changed_paths:
    hard_block_when:
      - changed file outside active allowed_paths
      - evaluator modifies product files
  approval_scope:
    hard_block_when:
      - approval-required category without granted approval
      - scope drift after approval
  same_session_verify_guard:
    hard_block_when:
      - assurance_impact requests detached_verified and independence is insufficient
  evidence_sufficiency:
    hard_block_when:
      - work close requested and evidence_state is not sufficient
      - record_eval verdict passed but supported criteria are missing
  reconcile_required:
    hard_block_when:
      - unresolved managed-state reconcile item affects active task close
